<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participación</title>
</head>
<body>
    
    <h1>Participaciones al azar</h1>
    <button onclick="numeroAleatorio()" type="button">Elegir aleatorio</button>
    
    <label class="mensaje">
        Número elegido:
        <span id="numero">#0</span>
    </label>
    
    <script>
        function numeroAleatorio(){
            const CANTIDAD_ALUMNOS = 31
            let aleatorio = Math.random() * CANTIDAD_ALUMNOS
            let resultado = Math.floor(aleatorio) + 1
            document.querySelector("#numero").innerText = resultado
            return resultado
        }
        
        // let resultado = Math.random(1,31) * 10
        // document.querySelector("#numero").innerText = numeroAleatorio()
    </script>
    
</body>
</html>
